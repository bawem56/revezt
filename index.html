<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Revezy FF Injector</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            height: 100vh;
            background: transparent; /* สำคัญมาก: ต้องใสเพื่อให้เห็นขอบมน */
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ตัวหน้าต่างหลัก */
        .injector-window {
            width: 500px;
            height: 350px;
            background: rgba(15, 15, 20, 0.95);
            border: 1px solid rgba(255, 0, 50, 0.5);
            border-radius: 20px; /* ขอบมนที่ต้องการ */
            box-shadow: 0 0 30px rgba(255, 0, 50, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* แถบด้านบนสำหรับลาก */
        .header {
            height: 45px;
            background: linear-gradient(90deg, #1a1a2e, #2d0a0e);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255, 0, 50, 0.3);
            -webkit-app-region: drag; /* ทำให้ลากหน้าต่างได้ในบางระบบ */
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            color: #ff2a4b;
            text-shadow: 0 0 10px #ff2a4b;
            letter-spacing: 2px;
        }

        .content { display: flex; flex: 1; }

        /* เมนูซ้าย */
        .sidebar {
            width: 130px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid rgba(255, 0, 50, 0.1);
            padding-top: 10px;
        }

        .tab {
            padding: 15px;
            font-size: 15px;
            color: #666;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: 0.2s;
        }

        .tab.active {
            color: #fff;
            background: rgba(255, 0, 50, 0.1);
            border-left: 3px solid #ff2a4b;
        }

        /* ฟังก์ชันขวา */
        .features { flex: 1; padding: 25px; display: flex; flex-direction: column; gap: 15px; }

        .feature-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 18px;
            border-radius: 10px;
        }

        /* Switch UI */
        .switch {
            position: relative;
            width: 40px;
            height: 20px;
            appearance: none;
            background: #333;
            outline: none;
            border-radius: 20px;
            transition: 0.3s;
            cursor: pointer;
        }

        .switch:checked { background: #ff2a4b; box-shadow: 0 0 10px #ff2a4b; }

        .switch::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            top: 2px; left: 2px;
            background: #fff;
            transition: 0.3s;
        }

        .switch:checked::before { left: 22px; }
    </style>
</head>
<body>

    <div class="injector-window">
        <div class="header">
            <div class="title">REVEZY EXTERNAL V1.0</div>
            <div style="color: #444; font-size: 12px;">✖</div>
        </div>

        <div class="content">
            <div class="sidebar">
                <div class="tab active">MAIN</div>
                <div class="tab">VISUAL</div>
                <div class="tab">MISC</div>
            </div>
            <div class="features">
                <div class="feature-item">
                    <span>Aimbot (Right Click)</span>
                    <input type="checkbox" class="switch" checked>
                </div>
                <div class="feature-item">
                    <span>Auto Headshot</span>
                    <input type="checkbox" class="switch">
                </div>
                <div class="feature-item">
                    <span>ESP Line</span>
                    <input type="checkbox" class="switch">
                </div>
            </div>
        </div>
    </div>

</body>
</html>
