<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff2a4b;
            --bg: rgba(10, 10, 12, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }

        body {
            height: 100vh;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
        }

        /* กล่องหลักแบบมนๆ ไม่เหลี่ยม */
        .window {
            width: 600px;
            height: 400px;
            background: var(--bg);
            border: 1px solid rgba(255, 42, 75, 0.3);
            border-radius: 24px; /* ความมนระดับมือโปร */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 42, 75, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(15px); /* พื้นหลังเบลอแบบกระจก */
        }

        /* แถบบน (Header) สำหรับลาก */
        .header {
            height: 60px;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(255, 42, 75, 0.1), transparent);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
            letter-spacing: 2px;
        }

        .status-badge {
            font-size: 11px;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            text-transform: uppercase;
        }

        .main { display: flex; flex: 1; }

        /* Sidebar สวยๆ */
        .sidebar {
            width: 180px;
            padding: 20px 0;
            background: rgba(0, 0, 0, 0.2);
        }

        .nav-link {
            padding: 12px 30px;
            color: #666;
            font-size: 14px;
            transition: 0.3s;
            border-right: 3px solid transparent;
        }

        .nav-link.active {
            color: #fff;
            background: linear-gradient(to right, transparent, rgba(255, 42, 75, 0.1));
            border-right: 3px solid var(--accent);
        }

        /* รายการฟังก์ชัน */
        .content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .option-card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(5px);
        }

        .option-info h4 { font-size: 15px; color: #eee; }
        .option-info p { font-size: 11px; color: #666; }

        /* Toggle Switch แบบพรีเมียม */
        .toggle {
            width: 45px;
            height: 22px;
            background: #222;
            border-radius: 50px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); }

        .toggle::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            top: 3px; left: 3px;
            transition: 0.3s;
        }

        .toggle.active::after { left: 26px; }

    </style>
</head>
<body>

<div class="window">
    <div class="header">
        <div class="logo">REVEZY PRO</div>
        <div class="status-badge">Undetected</div>
    </div>
    
    <div class="main">
        <div class="sidebar">
            <div class="nav-link active">🎯 AIMBOT</div>
            <div class="nav-item nav-link">👁️ VISUALS</div>
            <div class="nav-item nav-link">⚙️ SETTINGS</div>
        </div>
        
        <div class="content">
            <div class="option-card">
                <div class="option-info">
                    <h4>Enable Aimbot</h4>
                    <p>Lock on enemy automatically</p>
                </div>
                <div class="toggle active" onclick="this.classList.toggle('active')"></div>
            </div>

            <div class="option-card">
                <div class="option-info">
                    <h4>Prediction Line</h4>
                    <p>Calculate bullet travel time</p>
                </div>
                <div class="toggle" onclick="this.classList.toggle('active')"></div>
            </div>

            <div class="option-card">
                <div class="option-info">
                    <h4>Smooth Level</h4>
                    <p>Humanized mouse movement</p>
                </div>
                <div style="color: var(--accent); font-size: 13px;">95%</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
